spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agendamento}
    username: ${DB_USERNAME:postgres}
    # SEM default: o boot falha se DB_PASSWORD não estiver setado (evita senha fraca commitada).
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${PORT:8081}
  error:
    # nunca vazar mensagem de exceção interna ao cliente; mensagens intencionais
    # (401/403/400/409/422/429) são devolvidas pelo GlobalExceptionHandler.
    include-message: never

logging:
  level:
    org.springframework.security: ${SECURITY_LOG_LEVEL:INFO}

jwt:
  # SEM default: o boot falha se JWT_SECRET não estiver setado (evita segredo fraco/commitado).
  # Gere um forte: openssl rand -base64 48
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

evolution:
  api:
    url: ${EVOLUTION_URL:http://localhost:8080}
    key: ${EVOLUTION_KEY:evolution-api-key}
    instance: ${EVOLUTION_INSTANCE:agendabot}

mercadopago:
  # Sem token => modo MOCK (PIX fictício, webhook simulável localmente). Em produção,
  # usar credencial de teste/produção do painel do Mercado Pago.
  access-token: ${MP_ACCESS_TOKEN:}
  # URL pública (ngrok) para o MP notificar pagamentos. Opcional em dev.
  notification-url: ${MP_NOTIFICATION_URL:}

app:
  # URL do backend acessível pela Evolution (webhook de mensagens do WhatsApp).
  # Dev: localhost; produção: domínio público do backend.
  backend-url: ${APP_BACKEND_URL:http://localhost:8081}
  # Origens permitidas no CORS, separadas por vírgula. Produção: domínio do frontend.
  cors-origins: ${APP_CORS_ORIGINS:http://localhost:3000,http://localhost:3001}
